# Compass self-host config.
# The installer writes ~/compass/compass.yaml with generated secrets.

compose:
  version: latest

runtime:
  nodeEnv: production
  timezone: Etc/UTC
  logLevel: info

web:
  port: 9080
  url: https://cal.yourdomain.com

backend:
  port: 3000
  apiUrl: https://cal.yourdomain.com/api
  originsAllowed:
    - https://cal.yourdomain.com
  compassToken: replace-with-generated-compass-sync-token

mongo:
  username: compass
  password: replace-with-generated-mongo-password
  replicaSetKey: replace-with-generated-mongo-replica-set-key
  uri: mongodb://compass:replace-with-generated-mongo-password@mongo:27017/prod_calendar?authSource=admin&replicaSet=rs0

supertokens:
  uri: http://supertokens:3567
  key: replace-with-generated-supertokens-key
  postgres:
    user: supertokens
    password: replace-with-generated-supertokens-postgres-password
    database: supertokens

