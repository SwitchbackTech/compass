x-local-bindings:
  web: &web-port "127.0.0.1:${WEB_PORT:-9080}:9080"
  backend: &backend-port "127.0.0.1:${PORT:-3000}:3000"

services:
  web:
    image: ${COMPASS_WEB_IMAGE:-switchbacktech/compass-web:${COMPASS_VERSION:-latest}}
    # Uncomment the build block below and run `./compass rebuild` to build the web
    # image from source with your own backend.apiUrl and google.clientId baked in.
    # Requires the full repo to be present alongside this compose.yaml.
    # build:
    #   context: ..
    #   dockerfile: self-host/Dockerfile.web
    #   args:
    #     BASEURL: http://localhost:3000/api
    #     GOOGLE_CLIENT_ID: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - *web-port
    read_only: true
    restart: unless-stopped

  backend:
    image: switchbacktech/compass-backend:${COMPASS_VERSION:-latest}
    environment:
      COMPASS_CONFIG_FILE: /app/compass.yaml
    ports:
      - *backend-port
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${COMPASS_CONFIG_FILE:-./compass.yaml}:/app/compass.yaml:ro
      - compass_backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: switchbacktech/compass-mongo:${COMPASS_VERSION:-latest}
    profiles: [selfhost]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-compass}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me-mongo-password-32chars}
      MONGO_REPLICA_SET_KEY: ${MONGO_REPLICA_SET_KEY:-${MONGO_INITDB_ROOT_PASSWORD:-change-me-mongo-password-32chars}}
    volumes:
      - compass_mongo_data:/data/db
      - compass_mongo_configdb:/data/configdb
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'try { const status = rs.status(); if (status.ok === 1 && status.myState === 1) quit(0); } catch (e) { try { rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongo:27017\" }] }); } catch (initError) { if (!String(initError).includes(\"already initialized\")) throw initError; } } const status = rs.status(); quit(status.ok === 1 && status.myState === 1 ? 0 : 1);'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  supertokens:
    image: supertokens/supertokens-postgresql:11.0.2
    profiles: [selfhost]
    depends_on:
      supertokens-db:
        condition: service_healthy
    environment:
      API_KEYS: ${SUPERTOKENS_KEY:-change-me-supertokens-key-32chars}
      POSTGRESQL_CONNECTION_URI: postgresql://${SUPERTOKENS_POSTGRES_USER:-supertokens}:${SUPERTOKENS_POSTGRES_PASSWORD:-change-me-supertokens-postgres-pass-32}@supertokens-db:5432/${SUPERTOKENS_POSTGRES_DB:-supertokens}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/3567 && printf \"GET /hello HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep \"Hello\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  supertokens-db:
    image: postgres:16-alpine
    profiles: [selfhost]
    environment:
      POSTGRES_USER: ${SUPERTOKENS_POSTGRES_USER:-supertokens}
      POSTGRES_PASSWORD: ${SUPERTOKENS_POSTGRES_PASSWORD:-change-me-supertokens-postgres-pass-32}
      POSTGRES_DB: ${SUPERTOKENS_POSTGRES_DB:-supertokens}
    volumes:
      - compass_supertokens_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  compass_backend_logs:
  compass_mongo_configdb:
  compass_mongo_data:
  compass_supertokens_postgres_data:
